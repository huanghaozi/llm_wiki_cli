name: CLI & Native

on:
  push:
    branches: [main]
    paths:
      - "cli/**"
      - "native/**"
      - "vitest.cli.config.ts"
      - "package.json"
      - "yarn.lock"
      - ".github/workflows/cli.yml"
  pull_request:
    branches: [main]
    paths:
      - "cli/**"
      - "native/**"
      - "vitest.cli.config.ts"
      - "package.json"
      - "yarn.lock"
      - ".github/workflows/cli.yml"

jobs:
  cli-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: CLI unit & integration tests with coverage
        run: yarn test:cli:coverage

  native-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build llm-wiki-native
        shell: bash
        run: |
          cd native
          cargo build --release --target ${{ matrix.target }}

      - name: Run native unit tests (host only)
        if: matrix.target == 'x86_64-unknown-linux-gnu' || matrix.target == 'x86_64-pc-windows-msvc'
        shell: bash
        run: |
          cd native
          cargo test

      - name: Upload native binary
        uses: actions/upload-artifact@v4
        with:
          name: llm-wiki-native-${{ matrix.target }}
          path: |
            native/target/${{ matrix.target }}/release/llm-wiki-native
            native/target/${{ matrix.target }}/release/llm-wiki-native.exe
          if-no-files-found: error
          retention-days: 7
